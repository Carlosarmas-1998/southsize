<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo — Southsizetopping × Boxing Profight</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #faf9f7;
      --ink:   #0d0d0d;
      --ink-mid: #3a3a3a;
      --gold:  #b8975a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--ink); }

    /* ══════════════════════════
       NAV — idéntico al index
    ══════════════════════════ */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap; /* Añadido para responsiveness */
      gap: 12px;
      min-height: 70px; /* Cambiado a min-height */
      padding: 10px 40px; /* Ajustado el padding vertical */
      background: rgba(250,249,247,0.88);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-bottom: 1px solid rgba(13,13,13,0.08);
    }

    nav a {
      color: var(--ink);
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1.5px solid rgba(13,13,13,0.18);
      background: transparent;
      transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
      white-space: nowrap;
    }

    nav a:hover, nav a.active {
      background: var(--ink);
      color: var(--cream);
      border-color: var(--ink);
      transform: translateY(-1px);
    }

    /* ══════════════════════════
       HEADER
    ══════════════════════════ */
    header {
      padding: 148px 20px 52px;
      text-align: center;
    }

    .brand-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 6vw, 88px); /* Reducido el mínimo */
      font-weight: 700;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      line-height: 1.1; /* Ligero ajuste para móviles */
      margin-bottom: 20px;
      background: linear-gradient(to right, var(--ink) 10%, var(--gold) 50%, var(--ink) 90%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: colorFlow 6s linear infinite;
      word-wrap: break-word; /* Previene desbordamiento horizontal */
      overflow-wrap: break-word;
      max-width: 100%;
    }

    @keyframes colorFlow { to { background-position: 200% center; } }

    .header-sub {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--ink-mid);
    }

    /* ══════════════════════════
       CATEGORÍAS
    ══════════════════════════ */
    main {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 16px 5% 110px;
    }

    .cat-card {
      text-decoration: none;
      width: 100%;
      max-width: 420px;
      height: 84px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--ink);
      border-radius: 999px;
      overflow: hidden;
      background: var(--cream);
      transition: transform 0.45s cubic-bezier(0.19,1,0.22,1),
                  box-shadow 0.45s cubic-bezier(0.19,1,0.22,1);
    }

    .cat-card h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--ink);
      position: relative;
      z-index: 2;
      transition: color 0.45s cubic-bezier(0.19,1,0.22,1),
                  letter-spacing 0.45s cubic-bezier(0.19,1,0.22,1);
    }

    .cat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--ink);
      z-index: 1;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.45s cubic-bezier(0.19,1,0.22,1);
    }

    .cat-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 32px rgba(13,13,13,0.1);
      border-color: var(--ink);
    }

    .cat-card:hover::before { transform: scaleX(1); }
    .cat-card:hover h2      { color: var(--cream); letter-spacing: 0.7em; }

    /* ══════════════════════════
       SOPORTE FLOTANTE
    ══════════════════════════ */
    .support-float {
      position: fixed;
      bottom: 36px; right: 36px;
      background: var(--ink);
      color: var(--cream);
      padding: 13px 28px;
      border-radius: 999px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      box-shadow: 0 10px 28px rgba(13,13,13,0.18);
      z-index: 999;
      border: 1.5px solid var(--ink);
      transition: background 0.25s, color 0.25s, transform 0.25s;
    }

    .support-float:hover {
      background: var(--cream);
      color: var(--ink);
      transform: translateY(-3px);
    }

    .support-float svg {
      width: 16px; height: 16px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ══════════════════════════
       CONTACTO — idéntico al index
    ══════════════════════════ */
    .contact-section {
      background: var(--ink);
      padding: 100px 40px 80px;
      text-align: center;
    }

    .contact-tag {
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--gold);
      display: block;
      margin-bottom: 16px;
    }

    .contact-section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 5vw, 64px);
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.1em;
      color: var(--cream);
      margin-bottom: 56px;
    }

    .contact-buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
      max-width: 600px; /* Limita ancho para mejor wrap en tablet/móvil */
      margin: 0 auto;
    }

    .contact-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center; /* Centrar contenido interno */
      gap: 12px;
      padding: 16px 36px;
      text-decoration: none;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      border-radius: 999px;
      border: 1.5px solid rgba(250,249,247,0.22);
      color: rgba(250,249,247,0.7);
      transition: all 0.3s ease;
    }

    .contact-btn svg {
      width: 18px; height: 18px;
      stroke: currentColor;
      stroke-width: 1.5;
      fill: none;
      flex-shrink: 0;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    .contact-btn:hover svg { transform: scale(1.2); }

    .btn-ig:hover    { background: linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); color: #fff; border-color: transparent; }
    .btn-wa:hover    { background: #25D366; color: #fff; border-color: transparent; }
    .btn-email:hover { background: var(--gold); color: var(--ink); border-color: transparent; }

    /* ══════════════════════════
       FOOTER
    ══════════════════════════ */
    footer {
      background: var(--ink);
      border-top: 1px solid rgba(250,249,247,0.06);
      padding: 26px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.25em;
      color: rgba(250,249,247,0.2);
    }

    .footer-copy {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(250,249,247,0.12);
    }

    /* ══════════════════════════
       RESPONSIVE
    ══════════════════════════ */
    @media (max-width: 768px) {
      nav { padding: 10px 20px; gap: 8px; }
      nav a { font-size: 8px; padding: 8px 14px; letter-spacing: 0.2em; }
      .contact-section { padding: 80px 20px 60px; }
      footer { flex-direction: column; text-align: center; padding: 22px 24px; gap: 20px; }
    }

    @media (max-width: 480px) {
      nav { gap: 6px; padding: 10px; }
      nav a { font-size: 7px; padding: 6px 10px; letter-spacing: 0.15em; }
      
      .cat-card { max-width: 100%; height: 72px; } /* Ajuste de tarjeta */
      
      .support-float { 
        bottom: 20px; 
        right: 20px; 
        padding: 10px 20px; 
        font-size: 7px;
      }

      .contact-buttons { flex-direction: column; width: 100%; }
      .contact-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
