    <style>
        /* ═══ VARIABLES DE LUJO MINIMALISTA ═══ */
        :root {
            --bg-pure: #ffffff;
            --text-primary: #000000;
            --text-muted: #888888;
            --accent-gold: #cfa05d;
            --border-light: #eaeaea;
            --transition-luxury: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-pure);
            color: var(--text-primary);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ═══ NAVEGACIÓN CON CARRITO Y FAVORITOS ═══ */
        nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid var(--border-light);
        }

        .nav-links {
            display: flex; gap: 3rem; list-style: none;
        }

        .nav-links a {
            color: var(--text-primary); text-decoration: none; font-size: 0.6rem;
            font-weight: 500; text-transform: uppercase; letter-spacing: 3px;
            transition: var(--transition-luxury);
        }

        .nav-links a:hover { color: var(--accent-gold); }

        .nav-icons {
            display: flex; gap: 2rem; align-items: center;
        }

        .nav-icons a {
            color: var(--text-primary); text-decoration: none; position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        .nav-icons svg { width: 22px; height: 22px; transition: var(--transition-luxury); }
        .nav-icons a:hover svg { color: var(--accent-gold); transform: scale(1.1); }

        .cart-count {
            position: absolute; top: -5px; right: -8px;
            background: var(--text-primary); color: #fff;
            font-size: 9px; width: 16px; height: 16px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700;
        }

        /* ═══ CABECERA ═══ */
        header {
            padding: 180px 20px 60px;
            text-align: center;
        }

        .luxury-brand-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 6rem);
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 3rem;
            /* Efecto Color Fluido */
            background: linear-gradient(to right, #111 10%, #cfa05d 50%, #111 90%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: colorFlow 6s linear infinite;
        }

        @keyframes colorFlow { to { background-position: 200% center; } }

        .letter-lg { font-size: 1.25em; font-weight: 400; }

        /* ═══ CATEGORÍAS "PRO" (REDUCIDAS Y ELEGANTES) ═══ */
        .category-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem; /* Menos espacio entre botones */
            padding: 0 5% 100px;
            flex-grow: 1;
        }

        .cat-card {
            text-decoration: none;
            width: 100%;
            max-width: 380px; /* Tamaño mucho más reducido y elegante */
            height: 80px; /* Altura más delicada */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--text-primary);
            overflow: hidden;
            background: var(--bg-pure);
            transition: var(--transition-luxury);
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }

        .cat-card h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem; /* Texto ajustado a la nueva proporción */
            font-weight: 400;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: var(--text-primary);
            z-index: 2;
            transition: var(--transition-luxury);
        }

        /* Efecto de llenado y borde dorado */
        .cat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--text-primary);
            z-index: 1;
            transform: scaleY(0);
            transform-origin: bottom;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .cat-card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent-gold);
            z-index: 3;
            transform: scaleX(0);
            transition: transform 0.6s ease;
        }

        .cat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            border-color: var(--text-primary);
        }

        .cat-card:hover::before {
            transform: scaleY(1);
            transform-origin: top;
        }

        .cat-card:hover::after {
            transform: scaleX(1);
        }

        .cat-card:hover h2 {
            color: #fff;
            letter-spacing: 15px; /* Expansión sutil */
        }

        /* ═══ BOTÓN SOPORTE (PRO FLOTANTE) ═══ */
        .support-float {
            position: fixed; bottom: 40px; right: 40px;
            background-color: var(--text-primary); color: white;
            padding: 16px 35px; border-radius: 50px;
            text-decoration: none; display: flex; align-items: center; gap: 12px;
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 3px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            z-index: 2000; transition: var(--transition-luxury);
            border: 1px solid var(--text-primary);
        }

        .support-float:hover { 
            transform: translateY(-5px); 
            background-color: var(--bg-pure); 
            color: var(--text-primary);
        }
        
        .support-float svg { width: 20px; height: 20px; fill: currentColor; }

        /* ═══ FOOTER ═══ */
        footer {
            background-color: #fafafa;
            border-top: 1px solid var(--border-light);
            padding: 6rem 5% 3rem;
            text-align: center;
        }

        .footer-icons {
            display: flex; justify-content: center; align-items: center; gap: 4rem; margin-bottom: 3rem;
        }

        .footer-icons a { 
            transition: transform 0.3s ease; 
            display: flex; align-items: center; justify-content: center;
        }
        
        .footer-icons a:hover { transform: scale(1.15); }
        .footer-icons svg { width: 35px; height: 35px; }

        .copyright {
            font-size: 0.55rem; color: #888; text-transform: uppercase;
            letter-spacing: 2px; border-top: 1px solid #eaeaea; padding-top: 2rem;
            max-width: 600px; margin: 0 auto;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            nav { padding: 1.2rem 5%; }
            .nav-links { display: none; }
            .cat-card { height: 70px; max-width: 300px; }
            .cat-card h2 { font-size: 0.85rem; letter-spacing: 8px; }
            .support-float { bottom: 20px; right: 20px; padding: 12px 25px; font-size: 0.65rem; }
            .footer-icons { gap: 2.5rem; }
        }
    </style>
