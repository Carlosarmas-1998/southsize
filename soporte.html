<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  
  <title>Soporte y Atención | South Size Topping España</title>
  <meta name="description" content="Soporte oficial y atención al cliente de South Size Topping. Habla con Ángel, fundador y concierge de la marca.">
  <meta name="author" content="Ángel" />
  <link rel="canonical" href="https://www.streeturbanwear.com/soporte.html" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream:   #faf9f7;
      --ink:     #0d0d0d;
      --ink-mid: #3a3a3a;
      --ink-soft:#7a7875;
      --gold:    #b8975a;
      --border:  rgba(13,13,13,0.1);
      --ease:    cubic-bezier(.25,1,.4,1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--ink); }

    /* ══════════════════════════
       NAV Y DROPDOWN
    ══════════════════════════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 400;
      display: flex; justify-content: center; align-items: center;
      flex-wrap: wrap; gap: 12px; min-height: 70px; padding: 10px 40px;
      background: rgba(250,249,247,0.88); backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px); border-bottom: 1px solid rgba(13,13,13,0.08);
    }

    nav a.nav-pill, .dropbtn {
      color: var(--ink); text-decoration: none; font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
      padding: 10px 24px; border-radius: 999px; border: 1.5px solid rgba(13,13,13,0.18);
      background: transparent; transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
      white-space: nowrap; cursor: pointer;
    }

    nav a.nav-pill:hover, .dropbtn:hover, .dropbtn.active {
      background: var(--ink); color: var(--cream); border-color: var(--ink); transform: translateY(-1px);
    }

    .dropdown { position: relative; display: inline-block; }

    .dropdown-content {
      display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      background-color: var(--cream); min-width: 180px; box-shadow: 0px 10px 30px rgba(13,13,13,0.15);
      border-radius: 8px; border: 1px solid rgba(13,13,13,0.08); z-index: 500; margin-top: 10px;
      flex-direction: column; overflow: hidden;
    }

    .dropdown-content a {
      color: var(--ink); padding: 14px 20px; text-decoration: none; display: block;
      font-size: 7.5px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
      text-align: center; transition: background 0.2s ease, color 0.2s ease;
      border-bottom: 1px solid rgba(13,13,13,0.05);
    }

    .dropdown-content a:last-child { border-bottom: none; }
    .dropdown-content a:hover { background-color: var(--ink); color: var(--cream); }
    .dropdown:hover .dropdown-content { display: flex; animation: fadeUp 0.3s ease; }

    .nav-sep { width: 1px; height: 22px; background: rgba(13,13,13,0.18); flex-shrink: 0; }

    .nav-icon-btn {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: 38px; height: 38px;
      border-radius: 999px;
      border: 1.5px solid rgba(13,13,13,0.18);
      background: transparent;
      cursor: pointer; color: var(--ink);
      text-decoration: none;
      transition: background 0.25s, color 0.25s, border-color 0.25s, transform 0.2s;
      flex-shrink: 0;
    }

    .nav-icon-btn:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); transform: translateY(-1px); }
    .nav-icon-btn svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 1.8; fill: none; transition: fill 0.25s, stroke 0.25s; }
    .nav-icon-btn:hover svg { stroke: var(--cream); }
    .nav-icon-btn:hover .heart-svg { fill: var(--cream); stroke: var(--cream); }

    .cart-count, .fav-count {
      position: absolute; top: -4px; right: -4px;
      background: var(--ink); color: var(--cream);
      font-size: 7px; font-weight: 800;
      width: 14px; height: 14px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 1.5px solid var(--cream);
      transition: transform 0.3s;
      opacity: 0; transform: scale(0);
    }
    .cart-count.visible, .fav-count.visible { opacity: 1; transform: scale(1); }
    .heart-svg { fill: none; stroke: var(--ink); }
    .heart-svg.has-items { fill: #e03535; stroke: #e03535; }
    .bag-svg.has-items { stroke: var(--gold); }

    /* ══════════════════════════
       MAIN CHAT AREA
    ══════════════════════════ */
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      padding: 130px 20px 80px;
      flex-grow: 1;
      animation: fadeUp 1s var(--ease) forwards;
    }

    .support-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .support-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.05em;
      color: var(--ink);
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .support-subtitle {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* CHAT CONTAINER */
    .chat-container {
      width: 100%;
      max-width: 600px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 560px;
      background: #ffffff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(13,13,13,0.05);
      border-radius: 6px;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      flex-shrink: 0;
    }

    .chat-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.4rem;
      font-weight: 700;
      flex-shrink: 0;
      position: relative;
    }

    .chat-avatar::after {
      content: '';
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 10px;
      height: 10px;
      background: #25D366; /* WhatsApp green */
      border-radius: 50%;
      border: 2px solid #ffffff;
    }

    .chat-agent-info {
      display: flex;
      flex-direction: column;
    }

    .chat-agent-name {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .chat-agent-role {
      font-size: 0.6rem;
      color: var(--ink-soft);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* MESSAGES */
    .chat-messages {
      flex-grow: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

    .msg {
      max-width: 82%;
      padding: 14px 20px;
      font-size: 0.82rem;
      line-height: 1.7;
      font-weight: 500;
      animation: msgAppear 0.4s var(--ease) forwards;
      opacity: 0;
      transform: translateY(10px);
      position: relative;
    }

    .msg-time {
      display: block;
      font-size: 0.55rem;
      color: #aaa;
      margin-top: 6px;
      letter-spacing: 1px;
      text-align: right;
    }

    .msg-bot .msg-time { text-align: left; }

    @keyframes msgAppear {
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-bot {
      align-self: flex-start;
      background: #f5f4f0;
      border: 1px solid var(--border);
      color: var(--ink);
      border-radius: 0 16px 16px 16px;
    }

    .msg-user {
      align-self: flex-end;
      background: var(--ink);
      color: #fff;
      border-radius: 16px 0 16px 16px;
    }

    .msg-user .msg-time { color: rgba(255,255,255,0.45); }
    .msg-bot strong { color: var(--gold); font-weight: 700; }
    
    .msg-bot a {
      color: var(--ink);
      text-decoration: none;
      font-weight: 700;
      border-bottom: 1px solid var(--ink);
      transition: all 0.3s ease;
    }
    .msg-bot a:hover {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* TYPING */
    .typing-indicator {
      align-self: flex-start;
      display: flex;
      gap: 5px;
      padding: 14px 22px;
      background: #f5f4f0;
      border: 1px solid var(--border);
      border-radius: 0 16px 16px 16px;
      animation: msgAppear 0.3s ease forwards;
      opacity: 0;
    }

    .typing-indicator span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #bbb; animation: typingDot 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingDot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* QUICK REPLIES */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-self: flex-start;
      max-width: 90%;
      animation: msgAppear 0.5s var(--ease) forwards;
      animation-delay: 0.15s;
      opacity: 0;
    }

    .quick-btn {
      background: #ffffff;
      border: 1px solid var(--border);
      color: var(--ink);
      padding: 8px 16px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.25s, color 0.25s, border-color 0.25s;
      white-space: nowrap;
      border-radius: 999px;
    }

    .quick-btn:hover {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    /* INPUT */
    .chat-input-area {
      display: flex;
      align-items: center;
      border-top: 1px solid var(--border);
      padding: 0;
      flex-shrink: 0;
      background: #fafafa;
    }

    .chat-input {
      flex-grow: 1;
      border: none;
      outline: none;
      background: transparent;
      padding: 18px 24px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--ink);
    }

    .chat-input::placeholder {
      color: #aaa;
      font-weight: 400;
    }

    .chat-input:disabled { opacity: 0.5; }

    .chat-send {
      background: none;
      border: none;
      cursor: pointer;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .chat-send svg {
      width: 20px; height: 20px;
      color: var(--ink);
      transition: color 0.2s;
    }

    .chat-send:hover { transform: translateX(2px); }
    .chat-send:hover svg { color: var(--gold); }

    /* CONTACT CARDS IN CHAT */
    .contact-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      margin-top: 8px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none !important;
      color: var(--ink) !important;
      transition: border-color 0.25s, transform 0.25s !important;
    }

    .contact-card:hover {
      border-color: var(--gold);
      transform: translateX(4px);
    }

    .contact-card svg { width: 18px; height: 18px; flex-shrink: 0; }
    .contact-card span {
      font-size: 0.7rem; letter-spacing: 0.05em;
      font-weight: 700; text-transform: uppercase;
    }

    /* ══════════════════════════
       CONTACTO FOOTER
    ══════════════════════════ */
    .contact-section {
      background: var(--ink);
      padding: 90px 40px 70px;
      text-align: center;
      width: 100%;
    }

    .contact-tag {
      font-size: 7.5px; font-weight: 700;
      letter-spacing: 0.55em; text-transform: uppercase;
      color: var(--gold); display: block; margin-bottom: 14px;
    }

    .contact-section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(30px, 5vw, 60px);
      font-weight: 700; font-style: italic;
      letter-spacing: 0.1em; color: var(--cream);
      margin-bottom: 50px;
    }

    .contact-buttons { display: flex; justify-content: center; flex-wrap: wrap; gap: 14px; }

    .contact-btn {
      display: inline-flex; align-items: center; gap: 11px;
      padding: 14px 32px; text-decoration: none;
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.3em; text-transform: uppercase;
      border-radius: 999px;
      border: 1.5px solid rgba(250,249,247,0.2);
      color: rgba(250,249,247,0.65);
      transition: all 0.3s ease;
    }

    .contact-btn svg { width: 17px; height: 17px; stroke: currentColor; stroke-width: 1.5; fill: none; flex-shrink: 0; transition: transform 0.3s var(--ease); }
    .contact-btn:hover svg { transform: scale(1.2); }
    .btn-ig:hover    { background: linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); color:#fff; border-color:transparent; }
    .btn-wa:hover    { background: #25D366; color:#fff; border-color:transparent; }
    .btn-email:hover { background: var(--gold); color: var(--ink); border-color:transparent; }

    /* ══════════════════════════
       FOOTER
    ══════════════════════════ */
    footer {
      background: var(--ink);
      border-top: 1px solid rgba(250,249,247,0.06);
      padding: 24px 40px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 10px;
      width: 100%;
    }

    .footer-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px; font-weight: 700; font-style: italic;
      letter-spacing: 0.22em; color: rgba(250,249,247,0.2);
    }

    .footer-copy {
      font-size: 7.5px; font-weight: 600; letter-spacing: 0.28em;
      text-transform: uppercase; color: rgba(250,249,247,0.12);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════
       RESPONSIVE
    ══════════════════════════ */
    @media (max-width: 768px) {
      nav { padding: 10px 20px; gap: 8px; }
      nav a.nav-pill, .dropbtn { font-size: 8px; padding: 8px 16px; letter-spacing: 0.2em; }
      main { padding: 110px 16px 60px; }
      .chat-container { height: 500px; border-radius: 4px; }
      .contact-section { padding: 80px 20px 60px; }
      footer { flex-direction: column; text-align: center; padding: 22px 24px; gap: 20px; }
    }

    @media (max-width: 480px) {
      nav { gap: 6px; padding: 10px; }
      nav a.nav-pill, .dropbtn { font-size: 6.5px; padding: 6px 12px; letter-spacing: 0.15em; }
      .nav-sep { display: none; }
      .msg { font-size: 0.75rem; padding: 12px 16px; max-width: 90%; }
      .quick-btn { font-size: 0.6rem; padding: 7px 14px; }
      .contact-buttons { flex-direction: column; width: 100%; }
      .contact-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

  <script>
  (() => {
    /* ══════════════════════════
       CARRITO / BADGES
    ══════════════════════════ */
    function getCart() { try { return JSON.parse(localStorage.getItem('sst-cart')) || JSON.parse(localStorage.getItem('sst_cart')) || []; } catch { return []; } }
    function getFavs()  { try { return JSON.parse(localStorage.getItem('sst-fav'))  || []; } catch { return []; } }

    function syncBadges() {
      const cartTotal = getCart().reduce((s, i) => s + (i.qty || 1), 0);
      const favTotal  = getFavs().length;

      const cb = document.getElementById('cart-badge');
      const fb = document.getElementById('fav-badge');
      const hi = document.querySelector('.heart-svg');
      const bi = document.querySelector('.bag-svg');

      if (cb) { cb.textContent = cartTotal; cb.classList.toggle('visible', cartTotal > 0); }
      if (fb) { fb.textContent = favTotal;  fb.classList.toggle('visible', favTotal > 0); }
      if (hi) hi.classList.toggle('has-items', favTotal > 0);
      if (bi) bi.classList.toggle('has-items', cartTotal > 0);
    }

    document.addEventListener('DOMContentLoaded', () => {
      syncBadges();
      const dropbtn = document.querySelector('.dropbtn');
      if(dropbtn) dropbtn.addEventListener('click', e => e.preventDefault());
    });
    window.addEventListener('storage', syncBadges);

    /* ═══════════════════════════════════════════════════════
       ÁNGEL — BOT CONCIERGE SST (Motor de chat)
    ═══════════════════════════════════════════════════════ */
    const BRAND = {
      name: 'South Size Topping',

    function findResponse(input) {
      const n = norm(input);
      if (n.length < 2) {

      let bestScore = 0;
      for (const r of responses) {

        for (const kw of r.keywords) {
          const kwn = norm(kw);
          if (n.includes(kwn)) score += kwn.length;

        if (score > bestScore) { bestScore = score; bestMatch = r; }
      }
      if (bestMatch && bestScore >= 2) return pick(bestMatch.replies);
      return pick(fallbackReplies);
    }
