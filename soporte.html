    <style>
        /* ═══ VARIABLES DE LUJO MINIMALISTA ═══ */
        :root {
            --bg-pure: #ffffff;
            --text-primary: #000000;
            --text-muted: #888888;
            --border-subtle: #f0f0f0;
            --accent-gold: #cfa05d;
            --transition-luxury: all 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-pure);
            color: var(--text-primary);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ═══ NAVEGACIÓN SUPERIOR ═══ */
        nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 2.5rem 2rem;
            display: flex;
            justify-content: center;
            z-index: 1000;
            border-bottom: 1px solid var(--border-subtle);
        }

        .nav-links {
            display: flex; gap: 4.5rem; list-style: none; flex-wrap: wrap; justify-content: center;
        }

        .nav-links a {
            color: var(--text-primary); text-decoration: none; font-size: 0.65rem;
            font-weight: 500; text-transform: uppercase; letter-spacing: 3px;
            transition: var(--transition-luxury); position: relative;
        }

        .nav-links a:hover { color: var(--accent-gold); }

        .nav-links a::after {
            content: ''; position: absolute; width: 0; height: 1px;
            bottom: -6px; left: 50%; background-color: var(--accent-gold);
            transition: var(--transition-luxury); transform: translateX(-50%);
        }
        .nav-links a:hover::after { width: 100%; }

        /* ═══ CONTENIDO PRINCIPAL SOPORTE ═══ */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 700px;
            padding: 180px 20px 100px;
            flex-grow: 1;
        }

        .support-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .support-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
        }

        .support-subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        /* ═══ CHATBOT CONTAINER ═══ */
        .chat-container {
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            height: 520px;
            background: var(--bg-pure);
            position: relative;
            overflow: hidden;
        }

        /* Chat Header */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 20px 28px;
            border-bottom: 1px solid var(--border-subtle);
            background: #fafafa;
            flex-shrink: 0;
        }

        .chat-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            flex-shrink: 0;
            position: relative;
        }

        .chat-avatar::after {
            content: '';
            position: absolute;
            bottom: 1px;
            right: 1px;
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            border: 2px solid #fafafa;
        }

        .chat-agent-info {
            display: flex;
            flex-direction: column;
        }

        .chat-agent-name {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .chat-agent-role {
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Chat Messages Area */
        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 3px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 10px;
        }

        /* Message Bubbles */
        .msg {
            max-width: 82%;
            padding: 14px 20px;
            font-size: 0.82rem;
            line-height: 1.75;
            font-weight: 300;
            letter-spacing: 0.3px;
            animation: msgAppear 0.5s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes msgAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-bot {
            align-self: flex-start;
            background: #f7f7f7;
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            border-radius: 0 16px 16px 16px;
        }

        .msg-user {
            align-self: flex-end;
            background: var(--text-primary);
            color: #fff;
            border-radius: 16px 0 16px 16px;
        }

        .msg-bot strong {
            color: var(--accent-gold);
            font-weight: 500;
        }

        .msg-bot a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }

        .msg-bot a:hover {
            border-bottom-color: var(--accent-gold);
        }

        /* Typing indicator */
        .typing-indicator {
            align-self: flex-start;
            display: flex;
            gap: 5px;
            padding: 14px 22px;
            background: #f7f7f7;
            border: 1px solid var(--border-subtle);
            border-radius: 0 16px 16px 16px;
            animation: msgAppear 0.3s ease forwards;
            opacity: 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #bbb;
            animation: typingDot 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingDot {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Quick Reply Buttons */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-self: flex-start;
            max-width: 90%;
            animation: msgAppear 0.5s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            animation-delay: 0.15s;
            opacity: 0;
        }

        .quick-btn {
            background: var(--bg-pure);
            border: 1px solid var(--text-primary);
            color: var(--text-primary);
            padding: 9px 18px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: var(--transition-luxury);
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: var(--text-primary);
            color: #fff;
        }

        /* Chat Input */
        .chat-input-area {
            display: flex;
            align-items: center;
            border-top: 1px solid var(--border-subtle);
            padding: 0;
            flex-shrink: 0;
            background: #fafafa;
        }

        .chat-input {
            flex-grow: 1;
            border: none;
            outline: none;
            background: transparent;
            padding: 18px 24px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.78rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            color: var(--text-primary);
        }

        .chat-input::placeholder {
            color: #bbb;
            text-transform: uppercase;
            font-size: 0.62rem;
            letter-spacing: 2px;
        }

        .chat-send {
            background: none;
            border: none;
            cursor: pointer;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-luxury);
        }

        .chat-send svg {
            width: 20px;
            height: 20px;
            color: var(--text-primary);
            transition: var(--transition-luxury);
        }

        .chat-send:hover svg {
            color: var(--accent-gold);
            transform: translateX(2px);
        }

        /* Contact cards inside chat */
        .contact-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            margin-top: 8px;
            background: #fff;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-primary);
            transition: var(--transition-luxury);
        }

        .contact-card:hover {
            border-color: var(--accent-gold);
            transform: translateX(4px);
        }

        .contact-card svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .contact-card span {
            font-size: 0.7rem;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* ═══ FOOTER ═══ */
        footer {
            background-color: #fafafa;
            border-top: 1px solid var(--border-subtle);
            padding: 5rem 2rem 3rem;
            text-align: center;
            width: 100%;
        }

        .app-contact-grid {
            display: flex; justify-content: center; align-items: center; gap: 4rem; margin-bottom: 3rem;
        }

        .app-icon-link {
            text-decoration: none; transition: transform 0.3s ease; display: flex; align-items: center; justify-content: center;
        }

        .app-icon-link:hover { transform: scale(1.15); }
        .app-icon-link svg { width: 35px; height: 35px; }

        .copyright {
            font-size: 0.55rem; color: #888; text-transform: uppercase; letter-spacing: 2px;
            border-top: 1px solid #eaeaea; padding-top: 2rem; max-width: 600px; margin: 0 auto;
        }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width: 768px) {
            nav { padding: 1.5rem 1rem; }
            .nav-links { gap: 1rem; }
            .nav-links a { font-size: 0.55rem; letter-spacing: 1.5px; }
            main { padding: 140px 12px 60px; }
            .chat-container { height: 480px; }
            .chat-messages { padding: 18px; }
            .msg { font-size: 0.78rem; padding: 12px 16px; }
            .quick-btn { font-size: 0.58rem; padding: 7px 14px; }
            .app-contact-grid { gap: 2.5rem; }
        }
    </style>
</head>

            {
                keywords: ['privacidad', 'datos', 'rgpd', 'protección de datos', 'política'],
                reply: `Cumplimos estrictamente con el <strong>RGPD</strong> y la <strong>LOPDGDD</strong>. Tus datos solo se usan para gestionar pedidos y, con tu consentimiento, informarte de nuevas colecciones. Nunca vendemos datos a terceros. Puedes ejercer tus derechos ARCO-POL escribiendo a <strong>${BRAND.email}</strong>. Toda la info en <a href="politicas.html">Políticas</a>.`
            },
            {
                keywords: ['gracias', 'genial', 'perfecto', 'vale', 'ok', 'entendido'],
                reply: `¡Ha sido un placer! Si necesitas algo más, aquí estoy. Disfruta de la experiencia <strong>${BRAND.name}</strong>. ✨`
            },
            {
                keywords: ['adiós', 'adios', 'hasta luego', 'chao', 'bye'],
                reply: `¡Hasta pronto! Recuerda que puedes escribirme cuando lo necesites. Que tengas un excelente día. 🖤`
            }
        ];

        const fallbackReply = `Disculpa, no tengo una respuesta exacta para eso. Te sugiero contactar directamente con nuestro equipo para una atención personalizada:<br><br>` +
            `<a href="https://wa.me/34653181905" class="contact-card" target="_blank"><svg viewBox="0 0 24 24"><path fill="#25D366" d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347"/></svg><span>WhatsApp — ${BRAND.whatsapp}</span></a>` +
            `<a href="mailto:${BRAND.email}" class="contact-card"><svg viewBox="0 0 24 24" fill="#0078D4"><path d="M20 4H4C2.9 4 2.01 4.9 2.01 6L2 18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4ZM20 8L12 13L4 8V6L12 11L20 6V8Z"/></svg><span>Email — ${BRAND.email}</span></a>`;

        /* ═══ QUICK REPLIES INICIALES ═══ */
        const quickReplies = [
            { label: 'Devoluciones', text: 'devolucion' },
            { label: 'Envíos', text: 'envio' },
            { label: 'Tallas', text: 'tallas' },
            { label: 'Contacto', text: 'contacto' },
            { label: 'Catálogo', text: 'catálogo' },
            { label: 'Sobre la marca', text: 'marca historia' },
        ];

        /* ═══ DOM ═══ */
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSend = document.getElementById('chatSend');

        /* ═══ FUNCIONES ═══ */
        function addMessage(html, type = 'bot', delay = 0) {
            return new Promise(resolve => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = `msg msg-${type}`;
                    div.innerHTML = html;
                    chatMessages.appendChild(div);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    resolve();
                }, delay);
            });
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.id = 'typingIndicator';
            div.innerHTML = '<span></span><span></span><span></span>';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function showQuickReplies() {
            const container = document.createElement('div');
            container.className = 'quick-replies';
            container.id = 'quickReplies';
            quickReplies.forEach(qr => {
                const btn = document.createElement('button');
                btn.className = 'quick-btn';
                btn.textContent = qr.label;
                btn.addEventListener('click', () => {
                    removeQuickReplies();
                    handleUserInput(qr.text, qr.label);
                });
                container.appendChild(btn);
            });
            chatMessages.appendChild(container);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeQuickReplies() {
            const el = document.getElementById('quickReplies');
            if (el) el.remove();
        }

        function findResponse(input) {
            const lower = input.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            let bestMatch = null;
            let bestScore = 0;

            for (const r of responses) {
                let score = 0;
                for (const kw of r.keywords) {
                    const kwNorm = kw.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                    if (lower.includes(kwNorm)) score++;
                }
                if (score > bestScore) {
                    bestScore = score;
                    bestMatch = r;
                }
            }

            return bestMatch ? bestMatch.reply : fallbackReply;
        }

        async function handleUserInput(inputText, displayText) {
            const text = (displayText || inputText).trim();
            if (!text) return;

            await addMessage(text, 'user');
            chatInput.value = '';

            showTyping();

            const delay = 700 + Math.random() * 800;
            setTimeout(async () => {
                hideTyping();
                const reply = findResponse(inputText || text);
                await addMessage(reply, 'bot');

                // Show quick replies again after a short delay
                setTimeout(() => showQuickReplies(), 400);
            }, delay);
        }

        /* ═══ EVENT LISTENERS ═══ */
        chatSend.addEventListener('click', () => {
            removeQuickReplies();
            handleUserInput(chatInput.value);
        });

        chatInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                removeQuickReplies();
                handleUserInput(chatInput.value);
            }
        });

        /* ═══ INICIO ═══ */
        (async function init() {
            await addMessage(`Hola, soy <strong>Ángel</strong>, tu asistente personal de <strong>${BRAND.name}</strong>. Estoy aquí para ayudarte con cualquier consulta sobre la firma.`, 'bot', 500);
            await addMessage(`¿Sobre qué te gustaría saber?`, 'bot', 1200);
            setTimeout(() => showQuickReplies(), 1600);
        })();

    })();
    </script>
