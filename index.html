    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* ═══ VARIABLES DE LUJO MINIMALISTA ═══ */
        :root {
            --bg-pure: #ffffff;
            --text-primary: #000000;
            --text-muted: #888888;
            --border-subtle: #f0f0f0;
            --accent-gold: #cfa05d;
            --transition-luxury: all 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-pure);
            color: var(--text-primary);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        /* ═══ NAVEGACIÓN SUPERIOR INMACULADA ═══ */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 2.5rem 2rem;
            display: flex;
            justify-content: center;
            z-index: 1000;
            border-bottom: 1px solid var(--border-subtle);
        }

        .nav-links {
            display: flex;
            gap: 4.5rem;
            list-style: none;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: var(--transition-luxury);
            position: relative;
        }

        .nav-links a:hover {
            color: var(--accent-gold);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0; height: 1px;
            bottom: -6px; left: 50%;
            background-color: var(--accent-gold);
            transition: var(--transition-luxury);
            transform: translateX(-50%);
        }
        .nav-links a:hover::after { width: 100%; }

        /* ═══ CONTENEDOR PRINCIPAL ═══ */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            padding: 180px 20px 80px; /* Espacio para el menú */
            flex-grow: 1;
        }

        /* ═══ IMAGEN (SELLO) GRANDE Y SIN BORDES -> ENLACE A CATÁLOGO ═══ */
        .sello-enlace {
            display: block;
            text-decoration: none;
            margin-bottom: 2rem; /* Acerca la imagen al texto */
            transition: var(--transition-luxury);
        }

        .sello-enlace:hover {
            transform: scale(1.05);
        }

        .sello-img {
            /* Imagen mucho más grande */
            width: clamp(200px, 30vw, 400px);
            height: auto;
            display: block;
            /* Se funde con el fondo blanco sin perder sus colores originales */
            mix-blend-mode: multiply; 
        }

        /* ═══ NOMBRE DE MARCA MONUMENTAL -> ENLACE A CATÁLOGO ═══ */
        .brand-enlace {
            text-decoration: none;
            display: inline-block;
            margin-bottom: 2rem;
            transition: var(--transition-luxury);
        }

        .brand-enlace:hover {
            transform: scale(1.02);
        }

        .luxury-brand-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 6rem);
            font-weight: 400; /* Letra elegante */
            line-height: 1.1;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            
            /* Efecto fluido: Negro a Dorado líquido para que resalte en fondo blanco */
            background: linear-gradient(
                to right, 
                #111111 20%, 
                #cfa05d 50%, 
                #111111 80%
            );
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            text-fill-color: transparent;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: colorFlow 6s linear infinite;
        }

        @keyframes colorFlow {
            to { background-position: 200% center; }
        }

        /* Formateo de letras: Iniciales y finales grandes, internas más pequeñas */
        .letter-lg { font-size: 1.2em; font-weight: 500; }
        .letter-sm { font-size: 0.85em; font-weight: 400; }

        .madrid-location {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 400;
            margin-bottom: 2rem;
        }

        /* ═══ FOOTER & ICONOS DE CONTACTO ═══ */
        footer {
            background-color: #fafafa;
            border-top: 1px solid var(--border-subtle);
            padding: 5rem 2rem 3rem;
            text-align: center;
            width: 100%;
        }

        .app-contact-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4rem;
            margin-bottom: 3rem;
        }

        .app-icon-link {
            text-decoration: none;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-icon-link:hover {
            transform: scale(1.15);
        }

        .app-icon-link svg {
            width: 35px;
            height: 35px;
        }

        .copyright {
            font-size: 0.55rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-top: 1px solid #eaeaea;
            padding-top: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Ajustes Móviles */
        @media (max-width: 768px) {
            nav { padding: 1.5rem 1rem; }
            .nav-links { gap: 1rem; flex-wrap: wrap; justify-content: center; }
            .nav-links a { font-size: 0.55rem; letter-spacing: 1.5px; }
            main { padding-top: 140px; }
            .sello-img { width: 180px; }
            .app-contact-grid { gap: 3rem; }
            .app-icon-link svg { width: 30px; height: 30px; }
        }
    </style>
</head>
